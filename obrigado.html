<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inscrição recebida — Hackathon Salesforce 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/salesforce-logo.png" type="image/png">
    <style>
        /* Página obrigado: conteúdo central + footer fixo no mobile */
        .obrigado-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 140px; /* espaço para o footer fixo */
        }
        .obrigado-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px 32px;
        }
        .obrigado-card {
            background: var(--sf-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            max-width: 480px;
            width: 100%;
        }
        .obrigado-card h1 {
            font-size: 1.5rem;
            color: var(--sf-gray-900);
            margin-bottom: 12px;
        }
        .obrigado-card p {
            color: var(--sf-gray-500);
            margin-bottom: 24px;
        }
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-heading);
            color: var(--sf-white);
            background: var(--sf-blue-50);
            border: none;
            border-radius: var(--radius-sm);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(1, 118, 211, 0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-voltar:hover {
            background: var(--sf-blue-40);
            transform: translateY(-1px);
        }
        .btn-voltar:active {
            transform: translateY(0);
        }
        /* Footer fixo: logo + texto sempre embaixo */
        .obrigado-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--sf-white);
            border-top: 1px solid var(--sf-gray-200);
            padding: 20px 24px 24px;
            text-align: center;
            z-index: 10;
            /* safe area para notch/home indicator no mobile */
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }
        .obrigado-footer .footer-logo {
            display: block;
            margin: 0 auto 10px;
            height: 40px;
            width: auto;
            object-fit: contain;
        }
        .obrigado-footer p {
            margin: 0;
            font-size: 0.82rem;
            color: var(--sf-gray-500);
        }
        .obrigado-footer a {
            color: var(--sf-gray-700);
            text-decoration: none;
        }
        @media (max-width: 640px) {
            .obrigado-wrap {
                padding-bottom: 130px;
            }
            .obrigado-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="obrigado-wrap">
        <main class="obrigado-main">
            <div class="obrigado-card">
                <h1>Inscrição recebida!</h1>
                <p>Obrigado por se inscrever no Hackathon Salesforce 2026. Em breve você receberá um e-mail de confirmação.</p>
                <p><strong>Local:</strong> FECAP — Av. da Liberdade, 532, Liberdade, São Paulo - SP</p>
                <a href="index.html" class="btn-voltar">Voltar ao início</a>
            </div>
        </main>
    </div>

    <footer class="obrigado-footer">
        <img src="images/salesforce-logo.png" alt="Salesforce" class="footer-logo">
        <p>Hackathon Salesforce 2026 — Powered by Salesforce</p>
    </footer>
</body>
</html>
